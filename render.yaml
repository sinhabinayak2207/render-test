# Render Blueprint — deploy the FastAPI backend as a Docker web service.
# Secrets (sync:false) are set in the Render dashboard, NOT committed here.
services:
  - type: web
    name: tender-agent-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /docs
    autoDeploy: true
    envVars:
      # ── secrets — set these in the Render dashboard (Environment) ──
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TENDERKART_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # ── non-secret config (safe defaults) ──
      - key: TENDERKART_BASE_URL
        value: https://tenderkart.in/api/v1/client
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_CHAT_MODEL
        value: gpt-5-mini
      - key: SYNC_UPDATED_AFTER
        value: 2026-06-09T00:00:00Z
      - key: REQUEST_DELAY_SECONDS
        value: "2.5"
      - key: MAX_RETRIES
        value: "4"
      - key: OCR_LANG
        value: en
      # set this to your frontend origin(s) once deployed (comma-separated)
      - key: CORS_ORIGINS
        value: http://localhost:3000
